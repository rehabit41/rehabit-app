<!DOCTYPE html>
<html>
<head>
    <title>Upload Google Timeline JSON</title>
</head>
<body>
    <h2>Upload your Google Timeline JSON</h2>
    <form action="/upload" method="post" enctype="multipart/form-data">
        <input type="file" name="file" accept=".json" required>
        <button type="submit">Upload & Show Heatmap</button>
    </form>
</body>
</html>
