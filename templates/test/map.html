<!DOCTYPE html>
<html>
<head>
    <title>User Heatmap</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>
    <script src="https://unpkg.com/leaflet.heat/dist/leaflet-heat.js"></script>

    <style>
        #map { height: 100vh; margin: 0; padding: 0; }
    </style>
</head>
<body>

<div id="map"></div>

<script>
    var filename = "{{ filename }}";
    var map = L.map('map').setView([42.7, 25.3], 6); 

    L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
        maxZoom: 19
    }).addTo(map);

    var heatLayer;

    fetch(`/data/${filename}`)
        .then(response => response.json())
        .then(points => {
            heatLayer = L.heatLayer(points, {
                radius: 25,
                blur: 15,
                maxZoom: 17,
                gradient: {
                    0.2: 'blue',
                    0.4: 'green',
                    0.6: 'yellow',
                    1.0: 'red'
                }
            }).addTo(map);

            if(points.length > 0){
                var latSum = 0, lngSum = 0;
                points.forEach(p => { latSum += p[0]; lngSum += p[1]; });
                map.setView([latSum/points.length, lngSum/points.length], 13);
            }
        });
</script>

</body>
</html>
