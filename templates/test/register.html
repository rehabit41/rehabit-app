<!DOCTYPE html>
<html>

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Register</title>
  <link href="https://fonts.googleapis.com/css2?family=Prosto+One&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: #1A1528;
      --input-bg: #3A324B;
      --white: #fff;
      --gray: #aaa;
      --link: #4A90E2;
    }

    body, html {
      margin: 0;
      padding: 0;
      background-color: var(--bg);
      font-family: 'Prosto One', cursive;
      color: var(--white);
    }

    .container {
      max-width: 400px;
      margin: 0 auto;
      padding: 60px 25px 25px 25px;
    }

    .back-btn {
      width: 40px;
      height: 40px;
      border: 1px solid #544A66;
      border-radius: 10px;
      display: flex;
      align-items: center;
      justify-content: center;
      color: var(--white);
      font-size: 18px;
      text-decoration: none;
    }

    .logo {
      width: 90px;
      height: 90px;
      display: block;
      margin: 20px auto 10px auto;
      object-fit: contain;
    }

    h1 {
      font-size: 28px;
      text-align: center;
      margin: 10px 0 25px 0;
    }

    input[type="text"], input[type="email"], input[type="password"] {
      width: 100%;
      height: 50px;
      background-color: var(--input-bg);
      border: none;
      border-radius: 25px;
      padding: 0 20px;
      color: var(--white);
      font-family: 'Prosto One', cursive;
      margin-bottom: 15px;
      font-size: 16px;
    }

    input::placeholder {
      color: var(--gray);
    }

    .password-container {
      position: relative;
      display: flex;
      align-items: center;
      background-color: var(--input-bg);
      border-radius: 25px;
      height: 50px;
      margin-bottom: 15px;
      padding: 0 20px;
    }

    .password-container input {
      flex: 1;
      background: none;
      border: none;
      color: var(--white);
      font-size: 16px;
    }

    .toggle-btn {
      cursor: pointer;
      font-size: 20px;
      color: var(--gray);
      margin-left: 10px;
    }

    .btn {
      width: 100%;
      height: 50px;
      background-color: var(--white);
      color: var(--bg);
      border-radius: 25px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 18px;
      font-family: 'Prosto One', cursive;
      margin-bottom: 25px;
      text-decoration: none;
    }

    .login-link {
      display: flex;
      justify-content: center;
      font-size: 14px;
      color: #ccc;
    }

    .login-link a {
      color: var(--link);
      text-decoration: none;
      margin-left: 5px;
    }
  </style>
</head>
<body>

<div class="box">
    <h2>Register</h2>

    {% if error %}
        <p class="error">{{ error }}</p>
    {% endif %}

    <form method="POST">
        <input type="email" name="email" placeholder="Email" required>
        <input type="password" name="password" placeholder="Password" required>
        <input type = "text" name="age" placeholder="age" required>
        <input type = "text" name="calories" placeholder="enter calories" required>
        <input type = "text" name = "weight" placeholder="enter weight" required>
        <input type = "text" name = "height" placeholder="enter height" required>
        <input type = "text" name = "steps" placeholder="enter steps" required>

        <button type="submit"
        style="background-color: purple; color: white; width: 60px; height: 40px; border: none; border-radius: 15px; cursor: pointer;"
        >Create Account</button>
    </form>

    <p>Already have an account? <a href="/login">Login</a></p>
</div>

</body>
</html>
