<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Forgot Password</title>
  <link href="https://fonts.googleapis.com/css2?family=Prosto+One&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: #1c1926; /* COLORS.bg */
      --white: #ffffff;
      --gray: #aaa; /* COLORS.gray */
      --accent: #4A90E2; /* COLORS.accent */
      --input-bg: #2a2438; /* COLORS.inputBg */
      --text-dark: #1E1A2B;
    }

    body, html {
      margin: 0;
      padding: 0;
      background-color: var(--bg);
      font-family: 'Prosto One', cursive;
      color: var(--white);
      height: 100%;
    }

    .container {
      max-width: 400px;
      margin: 0 auto;
      padding: 25px;
      display: flex;
      flex-direction: column;
      align-items: center;
    }

    .back {
      margin-top: 40px;
      font-size: 20px;
      color: var(--white);
      text-decoration: none;
      align-self: flex-start;
    }

    h1 {
      font-size: 26px;
      margin-top: 30px;
      text-align: center;
    }

    p.subtitle {
      color: var(--gray);
      margin-top: 10px;
      text-align: center;
      max-width: 90%;
      font-size: 14px;
    }

    input[type="email"] {
      width: 100%;
      padding: 15px;
      border-radius: 25px;
      margin-top: 30px;
      border: none;
      background-color: var(--input-bg);
      color: var(--white);
      font-family: 'Prosto One', cursive;
      font-size: 16px;
    }

    input::placeholder {
      color: #aaa;
    }

    .btn {
      width: 100%;
      padding: 15px;
      border-radius: 25px;
      margin-top: 30px;
      background-color: var(--white);
      color: var(--text-dark);
      font-family: 'Prosto One', cursive;
      font-size: 18px;
      text-align: center;
      text-decoration: none;
      display: inline-block;
    }

    .bottom-link {
      margin-top: 30px;
      text-align: center;
      font-size: 14px;
    }

    .bottom-link a {
      color: var(--accent);
      text-decoration: none;
    }
  </style>
</head>
<body>

  <div class="container">
    <!-- Back button -->
    <a href="javascript:history.back()" class="back">◀</a>

    <!-- Title -->
    <h1>Forgot Password?</h1>

    <!-- Subtitle -->
    <p class="subtitle">
      Don't worry! It occurs. Please enter the email address linked with your account.
    </p>

    <!-- Email input -->
    <input type="email" placeholder="Email">

    <!-- Send Code button -->
    <a href="otp.html" class="btn">Send Code</a>

    <!-- Login link -->
    <div class="bottom-link">
      Remember Password? <a href="login.html">Login</a>
    </div>
  </div>

</body>
</html>
