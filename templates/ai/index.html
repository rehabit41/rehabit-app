<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AI Predictions Chat</title>
  <link href="https://fonts.googleapis.com/css2?family=Prosto+One&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: #1c1926;
      --user-bg: #4b475b;
      --ai-bg: #2f2b3a;
      --input-bg: #4b475b;
      --white: #ffffff;
      --gray: #aaa;
      --ai-text: #d6d3e6;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body, html {
      height: 100%;
      font-family: 'Prosto One', cursive;
      background-color: var(--bg);
      color: var(--white);
      display: flex;
      flex-direction: column;
    }

    .header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 20px;
      padding-top: 60px;
    }

    .header img {
      width: 36px;
      height: 36px;
      cursor: pointer;
    }

    .header h1 {
      font-size: 22px;
      color: var(--white);
    }

    .chat {
      flex: 1;
      padding: 16px;
      overflow-y: auto;
    }

    .message {
      padding: 14px;
      border-radius: 18px;
      margin-bottom: 12px;
      max-width: 85%;
      word-wrap: break-word;
    }

    .user {
      background-color: var(--user-bg);
      align-self: flex-end;
    }

    .ai {
      background-color: var(--ai-bg);
      align-self: flex-start;
      color: var(--ai-text);
    }

    .input-bar {
      display: flex;
      padding: 10px;
      margin: 16px;
      border-radius: 25px;
      background-color: var(--input-bg);
      align-items: center;
    }

    .input-bar input {
      flex: 1;
      padding: 8px 12px;
      border: none;
      border-radius: 20px;
      font-family: 'Prosto One', cursive;
      color: var(--white);
      background: transparent;
    }

    .send-btn {
      margin-left: 10px;
      padding: 8px 16px;
      border-radius: 20px;
      background-color: var(--white);
      color: #000;
      cursor: pointer;
      font-family: 'Prosto One', cursive;
    }
  </style>
</head>
<body>

  <div class="header">
    <img src="assets/icons/back.png" alt="Back" onclick="history.back()">
    <h1>AI Predictions</h1>
    <img src="assets/icons/ai.png" alt="AI">
  </div>

  <div class="chat" id="chat"></div>

  <div class="input-bar">
    <input type="text" id="user-input" placeholder="Ask something..." />
    <button class="send-btn" onclick="sendMessage()">Send</button>
  </div>

  <script>
    const chatEl = document.getElementById('chat');
    const inputEl = document.getElementById('user-input');

    const messages = [];

    function generatePrediction() {
      const steps = 7500 + Math.floor(Math.random() * 4000);
      const calories = 1200 + Math.floor(Math.random() * 700);
      const stress = 5 + Math.floor(Math.random() * 5);
      const consistency = 70 + Math.floor(Math.random() * 25);

      return `🔥 Next Month Projection 🔥\n\n` +
             `If you continue at your current pace:\n\n` +
             `• You will walk ${steps*30} total steps next month.\n` +
             `• You are expected to burn ${calories*30} calories.\n` +
             `• Stress levels may improve by ${stress}%.\n` +
             `• Expected consistency score: ${consistency}%.\n\n` +
             `✨ You're on track to build amazing habits. Keep going!`;
    }

    function renderMessages() {
      chatEl.innerHTML = '';
      messages.forEach(msg => {
        const div = document.createElement('div');
        div.className = 'message ' + (msg.sender === 'user' ? 'user' : 'ai');
        div.innerText = msg.text;
        chatEl.appendChild(div);
      });
      chatEl.scrollTop = chatEl.scrollHeight;
    }

    function sendMessage() {
      const text = inputEl.value.trim();
      if (!text) return;

      messages.push({ sender: 'user', text });
      renderMessages();

      inputEl.value = '';

      setTimeout(() => {
        let reply;
        if (text.toLowerCase().includes('predict') || text.toLowerCase().includes('progress') || text.toLowerCase().includes('month')) {
          reply = generatePrediction();
        } else {
          reply = "I understand! Staying consistent will help you progress. Want me to predict your next month?";
        }
        messages.push({ sender: 'ai', text: reply });
        renderMessages();
      }, 400);
    }

    // Initial AI prediction on page load
    messages.push({ sender: 'ai', text: generatePrediction() });
    renderMessages();
  </script>

</body>
</html>
