<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Reset Password</title>
  <link href="https://fonts.googleapis.com/css2?family=Prosto+One&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: #1c1926; /* COLORS.bg */
      --white: #ffffff;
      --gray: #aaaaaa;
      --input-bg: #2a2438; /* COLORS.inputBg */
      --text-dark: #1E1A2B;
    }

    body, html {
      margin: 0;
      padding: 0;
      height: 100%;
      background-color: var(--bg);
      font-family: 'Prosto One', cursive;
      color: var(--white);
    }

    .container {
      max-width: 400px;
      margin: 0 auto;
      padding: 25px;
    }

    .back {
      margin-top: 40px;
      font-size: 20px;
      color: var(--white);
      text-decoration: none;
      display: inline-block;
    }

    h1 {
      font-size: 26px;
      margin-top: 30px;
    }

    p.subtitle {
      color: var(--gray);
      margin-top: 10px;
      font-size: 14px;
    }

    input {
      width: 100%;
      padding: 15px;
      margin-top: 20px;
      border-radius: 25px;
      border: none;
      background-color: var(--input-bg);
      color: var(--white);
      font-family: 'Prosto One', cursive;
      font-size: 16px;
    }

    input::placeholder {
      color: var(--gray);
    }

    .button {
      background-color: var(--white);
      color: var(--text-dark);
      width: 100%;
      padding: 15px;
      border-radius: 25px;
      margin-top: 30px;
      text-align: center;
      font-size: 18px;
      font-family: 'Prosto One', cursive;
      text-decoration: none;
      display: inline-block;
    }
  </style>
</head>
<body>

  <div class="container">
    <!-- Back button -->
    <a href="javascript:history.back()" class="back">◀</a>

    <!-- Title -->
    <h1>Create new password</h1>

    <!-- Subtitle -->
    <p class="subtitle">Your new password must be different from previously used passwords.</p>

    <!-- Inputs -->
    <input type="password" placeholder="New Password">
    <input type="password" placeholder="Confirm Password">

    <!-- Reset button -->
    <a href="changed.html" class="button">Reset Password</a>
  </div>

</body>
</html>
