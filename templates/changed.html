<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Password Changed</title>
  <link href="https://fonts.googleapis.com/css2?family=Prosto+One&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: #1c1926; /* COLORS.bg */
      --white: #ffffff;
      --gray: #aaa; /* COLORS.gray */
      --text-dark: #1E1A2B;
    }

    body, html {
      margin: 0;
      padding: 0;
      height: 100%;
      background-color: var(--bg);
      font-family: 'Prosto One', cursive;
      display: flex;
      justify-content: center;
      align-items: center;
      color: var(--white);
    }

    .container {
      width: 100%;
      max-width: 400px;
      padding: 20px;
      text-align: center;
    }

    .success-img {
      width: 120px;
      height: 120px;
      margin-bottom: 20px;
      object-fit: contain;
    }

    h1 {
      font-size: 26px;
      margin-bottom: 10px;
    }

    p {
      color: var(--gray);
      font-size: 14px;
      margin-top: 10px;
    }

    .btn {
      margin-top: 40px;
      width: 80%;
      padding: 15px;
      border-radius: 25px;
      background-color: var(--white);
      color: var(--text-dark);
      font-family: 'Prosto One', cursive;
      font-size: 18px;
      text-align: center;
      text-decoration: none;
      display: inline-block;
    }
  </style>
</head>
<body>

  <div class="container">
    <!-- Success Image -->
    <img src="assets/images/success.png" alt="Success" class="success-img">

    <!-- Title -->
    <h1>Password Changed!</h1>

    <!-- Subtitle -->
    <p>Your password has been updated successfully.</p>

    <!-- Back to Login Button -->
    <a href="login.html" class="btn">Back to Login</a>
  </div>

</body>
</html>
