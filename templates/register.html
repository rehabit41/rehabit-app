<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Register</title>
  <link href="https://fonts.googleapis.com/css2?family=Prosto+One&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: #1A1528;
      --input-bg: #3A324B;
      --white: #fff;
      --gray: #aaa;
      --link: #4A90E2;
    }

    body, html {
      margin: 0;
      padding: 0;
      background-color: var(--bg);
      font-family: 'Prosto One', cursive;
      color: var(--white);
    }

    .container {
      max-width: 400px;
      margin: 0 auto;
      padding: 60px 25px 25px 25px;
    }

    .back-btn {
      width: 40px;
      height: 40px;
      border: 1px solid #544A66;
      border-radius: 10px;
      display: flex;
      align-items: center;
      justify-content: center;
      color: var(--white);
      font-size: 18px;
      text-decoration: none;
    }

    .logo {
      width: 90px;
      height: 90px;
      display: block;
      margin: 20px auto 10px auto;
      object-fit: contain;
    }

    h1 {
      font-size: 28px;
      text-align: center;
      margin: 10px 0 25px 0;
    }

    input[type="text"], input[type="email"], input[type="password"] {
      width: 100%;
      height: 50px;
      background-color: var(--input-bg);
      border: none;
      border-radius: 25px;
      padding: 0 20px;
      color: var(--white);
      font-family: 'Prosto One', cursive;
      margin-bottom: 15px;
      font-size: 16px;
    }

    input::placeholder {
      color: var(--gray);
    }

    .password-container {
      position: relative;
      display: flex;
      align-items: center;
      background-color: var(--input-bg);
      border-radius: 25px;
      height: 50px;
      margin-bottom: 15px;
      padding: 0 20px;
    }

    .password-container input {
      flex: 1;
      background: none;
      border: none;
      color: var(--white);
      font-size: 16px;
    }

    .toggle-btn {
      cursor: pointer;
      font-size: 20px;
      color: var(--gray);
      margin-left: 10px;
    }

    .btn {
      width: 100%;
      height: 50px;
      background-color: var(--white);
      color: var(--bg);
      border-radius: 25px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 18px;
      font-family: 'Prosto One', cursive;
      margin-bottom: 25px;
      text-decoration: none;
    }

    .login-link {
      display: flex;
      justify-content: center;
      font-size: 14px;
      color: #ccc;
    }

    .login-link a {
      color: var(--link);
      text-decoration: none;
      margin-left: 5px;
    }
  </style>
</head>
<body>

  <div class="container">
    <!-- Back Button -->
    <a href="javascript:history.back()" class="back-btn">‹</a>

    <!-- Logo -->
    <img src="assets/images/logo_full.png" alt="Logo" class="logo">

    {% if error %}
        <p class="error">{{ error }}</p>
    {% endif %}

    <!-- Title -->
    <h1>Hello! Register to<br>get started</h1>

    <!-- Inputs -->
    <input type="text" name="username" placeholder="Username" required>
    <input type="email" name="email" placeholder="Email" required>

    <input type="password" name="password" placeholder="Password" required>
    <input type="password" name="confirm-password" placeholder="Confirm Password" required>

    <!-- Password --
    <div class="password-container">
      <input type="password" placeholder="Password" id="password">
      <span class="toggle-btn" onclick="togglePassword('password', this)">👁‍🗨</span>
    </div>

    !-- Confirm Password --
    <div class="password-container">
      <input type="password" placeholder="Confirm password" id="confirm-password">
      <span class="toggle-btn" onclick="togglePassword('confirm-password', this)">👁‍🗨</span>
    </div>

    !-- Register Button -->
    <button type="submit">Register</button>

    <!-- Login Link -->
    <div class="login-link">
      Already have an account?
      <a href="login">Login Now</a>
    </div>
  </div>

      }

  </script>-->

</body>
</html>
