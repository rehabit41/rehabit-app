<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>OTP Verification</title>
  <link href="https://fonts.googleapis.com/css2?family=Prosto+One&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: #1c1926; /* COLORS.bg */
      --white: #ffffff;
      --gray: #aaa; /* COLORS.gray */
      --input-bg: #2a2438; /* COLORS.inputBg */
      --accent: #4A90E2; /* COLORS.accent */
      --text-dark: #1E1A2B;
    }

    body, html {
      margin: 0;
      padding: 0;
      background-color: var(--bg);
      font-family: 'Prosto One', cursive;
      color: var(--white);
    }

    .container {
      max-width: 400px;
      margin: 0 auto;
      padding: 25px;
    }

    .back {
      margin-top: 40px;
      font-size: 20px;
      color: var(--white);
      text-decoration: none;
      display: inline-block;
    }

    h1 {
      font-size: 26px;
      margin-top: 30px;
    }

    p.subtitle {
      color: var(--gray);
      margin-top: 10px;
      font-size: 14px;
    }

    .otp-row {
      display: flex;
      gap: 15px;
      margin-top: 25px;
      justify-content: center;
    }

    .otp-input {
      width: 55px;
      height: 55px;
      border-radius: 15px;
      background-color: var(--input-bg);
      text-align: center;
      font-size: 22px;
      color: var(--white);
      border: none;
    }

    .btn {
      background-color: var(--white);
      color: var(--text-dark);
      width: 100%;
      padding: 15px;
      border-radius: 25px;
      margin-top: 40px;
      text-align: center;
      font-size: 18px;
      font-family: 'Prosto One', cursive;
      text-decoration: none;
      display: inline-block;
    }

    .resend {
      margin-top: 20px;
      text-align: center;
      font-size: 14px;
    }

    .resend a {
      color: var(--accent);
      text-decoration: none;
      cursor: pointer;
    }
  </style>
</head>
<body>

  <div class="container">
    <!-- Back Button -->
    <a href="javascript:history.back()" class="back">◀</a>

    <!-- Title -->
    <h1>OTP Verification</h1>
    <p class="subtitle">Enter the verification code we sent to your email.</p>

    <!-- OTP Inputs -->
    <div class="otp-row">
      <input type="text" maxlength="1" class="otp-input">
      <input type="text" maxlength="1" class="otp-input">
      <input type="text" maxlength="1" class="otp-input">
      <input type="text" maxlength="1" class="otp-input">
    </div>

    <!-- Verify Button -->
    <a href="reset.html" class="btn">Verify</a>

    <!-- Resend Link -->
    <div class="resend">
      Didn’t receive code? <a href="#">Resend</a>
    </div>
  </div>

</body>
</html>
