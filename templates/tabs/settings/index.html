<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Settings</title>
<style>
  body {
    background-color: #1c1926;
    color: white;
    font-family: Arial, sans-serif;
    margin: 0;
    padding: 20px;
  }

  h1 {
    font-size: 32px;
    margin-bottom: 24px;
  }

  .card {
    background-color: #2a2636;
    padding: 20px;
    border-radius: 20px;
    margin-bottom: 30px;
  }

  .label {
    color: #aaa;
    font-size: 14px;
    margin-bottom: 10px;
  }

  .item {
    font-size: 18px;
    margin-bottom: 12px;
    cursor: pointer;
  }

  .item:hover {
    text-decoration: underline;
  }

  .logout-button {
    margin-top: 40px;
    background-color: #ff4d4d;
    padding: 16px;
    border-radius: 12px;
    text-align: center;
    font-size: 18px;
    cursor: pointer;
  }
</style>
</head>
<body>

<h1>Settings</h1>

<div class="card">
  <div class="label">Account</div>
  <div class="item" onclick="alert('Edit Profile clicked')">Edit Profile</div>
  <div class="item" onclick="alert('Change Password clicked')">Change Password</div>
</div>

<div class="card">
  <div class="label">App</div>
  <div class="item" onclick="redoQuestions()">Redo Onboarding Questions</div>
  <div class="item" onclick="alert('Notifications clicked')">Notifications</div>
</div>

<div class="logout-button" onclick="logout()">Log out</div>

<script>

</script>

</html>
