<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Bottom Tabs</title>
<style>
  body {
    margin: 0;
    font-family: Arial, sans-serif;
    background-color: #1C1926;
    color: white;
    padding-bottom: 100px; /* leave space for bottom nav */
  }

  .tab-bar {
    position: fixed;
    bottom: 20px;
    left: 20px;
    right: 20px;
    height: 80px;
    background-color: #4b475b;
    border-radius: 40px;
    display: flex;
    justify-content: space-around;
    align-items: center;
  }

  .tab-item {
    width: 60px;
    height: 60px;
    border-radius: 30px;
    background-color: #3a3648;
    display: flex;
    justify-content: center;
    align-items: center;
    cursor: pointer;
  }

  .tab-item.active {
    background-color: #fff;
  }

  .tab-item img {
    width: 30px;
    height: 30px;
    transition: filter 0.2s;
  }

  .tab-item.active img {
    filter: brightness(0);
  }
</style>
</head>
<body>

<div class="tab-bar">
  <div class="tab-item active" id="homeTab">
    <img src="dashboard.png" alt="Home">
  </div>
  <div class="tab-item" id="mapsTab">
    <img src="map.png" alt="Maps">
  </div>
  <div class="tab-item" id="statsTab">
    <img src="stats.png" alt="Stats">
  </div>
  <div class="tab-item" id="settingsTab">
    <img src="settings.png" alt="Settings">
  </div>
</div>

<script>
  const tabs = ['homeTab', 'mapsTab', 'statsTab', 'settingsTab'];

  tabs.forEach(id => {
    const tab = document.getElementById(id);
    tab.addEventListener('click', () => {
      tabs.forEach(t => document.getElementById(t).classList.remove('active'));
      tab.classList.add('active');

      // Here you could switch content
      console.log(`Switched to ${id.replace('Tab','')}`);
    });
  });
</script>

</body>
</html>
