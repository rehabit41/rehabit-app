<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Start Screen</title>
  <link href="https://fonts.googleapis.com/css2?family=Prosto+One&display=swap" rel="stylesheet">
  <style>
    body, html {
      margin: 0;
      padding: 0;
      height: 100%;
      font-family: 'Prosto One', cursive;
      background-color: #1E1A2B;
      display: flex;
      justify-content: center;
      align-items: center;
    }

    .container {
      text-align: center;
      width: 100%;
      max-width: 400px;
      padding: 20px;
    }

    .logo {
      width: 180px;
      height: 180px;
      object-fit: contain;
    }

    h1 {
      color: white;
      font-size: 28px;
      margin-top: 30px;
    }

    .btn {
      display: block;
      width: 85%;
      padding: 15px;
      border-radius: 25px;
      margin: 15px auto;
      text-decoration: none;
      text-align: center;
      font-size: 18px;
      font-family: 'Prosto One', cursive;
      cursor: pointer;
    }

    .btn-login {
      background-color: #4A435A;
      color: white;
    }

    .btn-register {
      background-color: white;
      color: #1E1A2B;
    }

    .guest {
      color: white;
      opacity: 0.7;
      font-size: 14px;
      margin-top: 20px;
      display: inline-block;
      text-decoration: none;
    }
  </style>
</head>
<body>

  <div class="container">
    <!-- Logo -->
    <img src="{{ url_for('static', filename='assets/icons/logo_full.png') }}" alt="Logo" class="logo">

    <!-- Title -->
    <h1>Start now!</h1>

    <!-- Buttons -->
    <a href="login" class="btn btn-login">Login</a>
    <a href="register" class="btn btn-register">Register</a>
    <a href="home" class="guest">Continue as guest</a>
  </div>

</body>
</html>
